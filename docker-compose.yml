version: "3.9"

services:
  mlflow:
    image: python:3.11-slim
    working_dir: /mlflow
    command: >
      sh -c "pip install --no-cache-dir mlflow==2.22.1 &&
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root file:///mlflow/artifacts
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./:/mlflow

  api:
    build: .
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
